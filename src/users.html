<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/users.css" />
    <title>Users</title>
  </head>
  <body>
    <div class="header horizont-box">
      <form class="card form-inline search-form js-create-form">
        <div class="form-group">
          firstName: <input type="text" name="firstName" />
        </div>
        <div class="form-group">
          lastName: <input type="text" name="lastName" />
        </div>
        <div class="form-group">major: <input type="text" name="major" /></div>
        <div class="form-group">
          cohortYear: <input type="number" name="cohortYear" />
        </div>

        <button type="submit" class="btn btn-primary">Створити</button>
      </form>

      <form class="card form-inline search-form js-update-form">
        <div class="form-group">Id: <input type="text" name="userId" /></div>
        <div class="form-group">
          firstName: <input type="text" name="firstName" />
        </div>
        <div class="form-group">
          lastName: <input type="text" name="lastName" />
        </div>
        <div class="form-group">major: <input type="text" name="major" /></div>
        <div class="form-group">
          cohortYear: <input type="number" name="cohortYear" />
        </div>

        <button type="submit" class="btn btn-primary">Оновити</button>
      </form>

      <form class="card form-inline search-form js-reset-form">
        <div class="form-group">Id: <input type="text" name="userId" /></div>
        <div class="form-group">
          firstName: <input type="text" name="firstName" />
        </div>
        <div class="form-group">
          lastName: <input type="text" name="lastName" />
        </div>
        <div class="form-group">major: <input type="text" name="major" /></div>
        <div class="form-group">
          cohortYear: <input type="number" name="cohortYear" />
        </div>

        <button type="submit" class="btn btn-primary">Перезаписати</button>
      </form>
    </div>

    <ul class="news-list js-user-list"></ul>

    <script src="./js/users.js" type="module"></script>
  </body>
</html>
